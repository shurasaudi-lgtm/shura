<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محفظة الذهب - أبو رائد</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 90%;
            max-width: 450px;
            background: #252525;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid #d4af37;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        h2 { color: #d4af37; font-size: 24px; margin-bottom: 15px; }
        
        .live-price-box {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            margin: 15px 0;
            padding: 15px;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 10px;
            border: 1px dashed #d4af37;
        }

        .input-group { margin-bottom: 15px; text-align: right; }
        label { font-size: 16px; color: #d4af37; display: block; margin-bottom: 5px; }
        
        input {
            width: 100%;
            padding: 10px;
            font-size: 18px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #111;
            color: #ffd700;
            box-sizing: border-box;
            text-align: center;
        }

        .results {
            border-top: 1px solid #444;
            padding-top: 15px;
            margin-top: 15px;
        }
        .res-line { font-size: 20px; margin: 8px 0; }
        .profit { color: #2ecc71; font-weight: bold; font-size: 24px; }
        .loss { color: #e74c3c; font-weight: bold; font-size: 24px; }
        
        #update-time { font-size: 11px; color: #777; margin-top: 10px; }
        .btn-refresh {
            background: #d4af37;
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>💰 متابعة أسعار الذهب</h2>
    
    <div id="price-display" class="live-price-box">جاري الاتصال بالسوق...</div>
    <button class="btn-refresh" onclick="getGoldPrice()">تحديث يدوي للسعر</button>

    <div class="input-group" style="margin-top: 20px;">
        <label>كمية الذهب (جرام):</label>
        <input type="number" id="grams" placeholder="0" oninput="updateCalculations()">
    </div>

    <div class="input-group">
        <label>متوسط التكلفة للجرام (ريال):</label>
        <input type="number" id="avg-cost" placeholder="0" oninput="updateCalculations()">
    </div>

    <div class="results">
        <div class="res-line">إجمالي القيمة الحالية: <br> <span id="total-value" style="color:#fff">0</span> ريال</div>
        <div class="res-line">صافي الربح/الخسارة: <br> <span id="profit-value" class="profit">0</span> ريال</div>
    </div>

    <div id="update-time">سيتم التحديث آلياً كل دقيقة</div>
</div>

<script>
    let currentGoldPrice = 0;

    async function getGoldPrice() {
        const display = document.getElementById('price-display');
        display.style.opacity = "0.5";
        
        try {
            // محاولة الجلب من المصدر الجديد (Binance API كخيار سريع ومستقر للذهب مقابل العملات المستقرة)
            // أو استخدام مصدر بديل في حال تعطل الأول
            const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
            const data = await response.json();
            
            // PAXG هو عملة رقمية مدعومة بالذهب الحقيقي (أونصة واحدة لكل عملة)
            // السعر يأتي بالدولار لكل أونصة
            const priceUSDPerGram = parseFloat(data.price) / 31.1035;
            currentGoldPrice = priceUSDPerGram * 3.75; // التحويل للريال

            display.innerText = currentGoldPrice.toFixed(2) + " ر.س";
            display.style.opacity = "1";
            document.getElementById('update-time').innerText = "آخر تحديث ناجح: " + new Date().toLocaleTimeString('ar-SA');
            updateCalculations();
        } catch (e) {
            // خطة بديلة في حال تعطل المصدر أعلاه
            display.innerText = "خطأ.. جاري المحاولة";
            setTimeout(getGoldPrice, 5000); 
        }
    }

    function updateCalculations() {
        const grams = parseFloat(document.getElementById('grams').value) || 0;
        const avgCost = parseFloat(document.getElementById('avg-cost').value) || 0;

        const totalValue = grams * currentGoldPrice;
        const totalCost = grams * avgCost;
        const profit = totalValue - totalCost;

        document.getElementById('total-value').innerText = totalValue.toLocaleString('ar-SA', {maximumFractionDigits: 2});
        
        const profitElement = document.getElementById('profit-value');
        const formattedProfit = profit.toLocaleString('ar-SA', {maximumFractionDigits: 2});
        profitElement.innerText = (profit > 0 ? "+ " : "") + formattedProfit;
        
        profitElement.className = profit >= 0 ? 'profit' : 'loss';
    }

    // تشغيل الجلب فوراً
    getGoldPrice();
    // تحديث كل 60 ثانية ليكون أدق
    setInterval(getGoldPrice, 60000);
</script>

</body>
</html>
