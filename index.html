<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم أبو رائد</title>
    <style>
        body { 
            background-color: #121212; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            color: white; 
            padding: 50px 20px;
            margin: 0;
        }
        h1 { 
            color: #ffffff; 
            font-size: 32px;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 25px; 
            padding: 20px; 
            max-width: 900px; 
            margin: auto; 
        }
        .card { 
            background: linear-gradient(145deg, #1e1e1e, #252525); 
            padding: 40px 20px; 
            border-radius: 20px; 
            border: 2px solid #d4af37; 
            text-decoration: none; 
            color: #d4af37; 
            font-size: 26px; 
            font-weight: bold; 
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .card:hover { 
            background: #d4af37; 
            color: #000; 
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
        }
        .card span {
            font-size: 50px;
            margin-bottom: 15px;
        }
        .footer {
            margin-top: 50px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>مرحباً أبو رائد - لوحة التحكم الشخصية</h1>

    <div class="grid">
        <a href="gold.html" class="card">
            <span>💰</span>
            حاسبة الذهب
        </a>

        <a href="https://gemini.google.com" target="_blank" class="card">
            <span>🤖</span>
            جيميناي (AI)
        </a>

        <a href="https://suno.com" target="_blank" class="card">
            <span>🎵</span>
            سونو (موسيقى)
        </a>

        <a href="https://hedra.com" target="_blank" class="card">
            <span>🎬</span>
            هيدرا (فيديو)
        </a>
    </div>

    <div class="footer">
        تم التصميم خصيصاً لأبو رائد | 2026
    </div>

</body>
</html>
