<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محفظة الذهب - أبو رائد</title>
    <style>
        body { background-color: #1a1a1a; color: #ffffff; font-family: Arial; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; flex-direction: column; }
        .container { width: 90%; max-width: 450px; background: #252525; padding: 25px; border-radius: 20px; border: 2px solid #d4af37; text-align: center; }
        .btn-back { background: none; border: 1px solid #d4af37; color: #d4af37; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-size: 14px; margin-bottom: 20px; display: inline-block; }
        .btn-back:hover { background: #d4af37; color: #000; }
        .live-price-box { font-size: 32px; font-weight: bold; margin: 15px 0; padding: 15px; background: rgba(212, 175, 55, 0.1); border-radius: 10px; border: 1px dashed #d4af37; }
        input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #444; background: #111; color: #ffd700; text-align: center; }
        .results { border-top: 1px solid #444; margin-top: 15px; padding-top: 15px; }
        .profit { color: #2ecc71; font-weight: bold; font-size: 24px; }
        .loss { color: #e74c3c; font-weight: bold; font-size: 24px; }
    </style>
</head>
<body>

    <a href="index.html" class="btn-back">⬅️ العودة للوحة التحكم</a>

    <div class="container">
        <h2 style="color:#d4af37">💰 متابعة أسعار الذهب</h2>
        <div id="price-display" class="live-price-box">جاري الجلب...</div>
        
        <div style="text-align:right; margin-bottom:15px;">
            <label>الكمية (جرام):</label>
            <input type="number" id="grams" oninput="calculate()">
        </div>
        <div style="text-align:right; margin-bottom:15px;">
            <label>متوسط التكلفة (ريال):</label>
            <input type="number" id="avg-cost" oninput="calculate()">
        </div>

        <div class="results">
            <div style="font-size:20px">القيمة الحالية: <br> <span id="total-value">0</span> ريال</div>
            <div style="font-size:20px; margin-top:10px;">الربح/الخسارة: <br> <span id="profit-value" class="profit">0</span> ريال</div>
        </div>
    </div>

<script>
    let goldPrice = 0;
    async function getPrice() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
            const data = await res.json();
            goldPrice = (parseFloat(data.price) / 31.1035) * 3.75;
            document.getElementById('price-display').innerText = goldPrice.toFixed(2) + " ر.س";
            calculate();
        } catch (e) { document.getElementById('price-display').innerText = "خطأ في التحديث"; }
    }
    function calculate() {
        const g = parseFloat(document.getElementById('grams').value) || 0;
        const c = parseFloat(document.getElementById('avg-cost').value) || 0;
        const val = g * goldPrice;
        const profit = val - (g * c);
        document.getElementById('total-value').innerText = val.toLocaleString('ar-SA');
        const pElem = document.getElementById('profit-value');
        pElem.innerText = profit.toLocaleString('ar-SA');
        pElem.className = profit >= 0 ? 'profit' : 'loss';
    }
    getPrice();
    setInterval(getPrice, 60000);
</script>
</body>
</html>
